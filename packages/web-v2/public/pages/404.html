<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>404 — Page Not Found · Julion</title>
  <meta name="robots" content="noindex"/>
  <meta name="theme-color" content="#6b7bff"/>
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico"/>
  <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png"/>
  <link rel="stylesheet" href="/styles.css"/>

  <!-- OG for shared 404 pages -->
  <meta property="og:title"       content="404 — Page Not Found · Julion"/>
  <meta property="og:description" content="The page you're looking for doesn't exist."/>
  <meta property="og:image"       content="/images/julion-og.png"/>
</head>
<body>
<div class="app-shell">
  <header class="app-header" style="text-align:center">
    <a href="/" style="text-decoration:none">
      <img src="/images/julion-logo.png" alt="Julion" width="56" height="56"
           style="margin-bottom:16px" onerror="this.style.display='none'"/>
    </a>
    <p class="eyebrow">404</p>
    <h1 style="font-size:2.4rem">Page not found</h1>
    <p class="lead" style="margin:14px auto 0">
      The page you're looking for doesn't exist or has been moved.
    </p>
  </header>

  <main>
    <section class="card card-primary" style="text-align:center">
      <div class="button-row" style="justify-content:center;gap:12px;display:flex;flex-wrap:wrap">
        <a class="button" href="/">Go home</a>
        <a class="button button-secondary" href="/dashboard">Dashboard</a>
      </div>
    </section>
  </main>

  <footer class="app-footer" style="text-align:center">
    <p>
      <img src="/images/julion-logo.png" alt="" width="14" height="14"
           style="vertical-align:middle;margin-right:4px;opacity:0.5" onerror="this.style.display='none'"/>
      Julion &copy; <script>document.write(new Date().getFullYear())</script>
    </p>
  </footer>
</div>
</body>
</html>
